<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento | Studio Teste Nails</title>

  <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>

<section class="hero">
  
  <div class="hero-texto">
    <span class="tag">Curso Profissional de Unhas</span>

    <h1>
      Aprenda alongamento de unhas e 
      <span style="color:#ff2e93;">comece a faturar ainda esse mês</span>
    </h1>

    <p>
      Domine <strong>fibra de vidro</strong>, <strong>molde F1</strong>,
      <strong>esmaltação em gel</strong> e <strong>postiça realista</strong>.
    </p>

    <p>
      Mesmo começando do zero, você pode <strong>transformar sua renda</strong>
      e começar a <strong>atender com segurança e qualidade</strong>.
    </p>
  </div>

  <!-- CARROSSEL -->
  <div class="hero-imagem">

    <div class="carousel">

      <button class="nav prev">‹</button>

      <div class="viewport">
        <div class="track">

          <div class="slide">
            <img src="./img/gabriela-inicio-carreira.jpg">
          </div>

          <div class="slide">
            <img src="./img/professora2.jpg">
          </div>

          <div class="slide">
            <img src="./img/gabriela-atendendo-cliente.jpg">
          </div>

        </div>
      </div>

      <button class="nav next">›</button>

    </div>

  </div>

</section>

<!-- JS DO CARROSSEL -->
<script>
const track = document.querySelector(".track");
const slides = document.querySelectorAll(".slide");
const next = document.querySelector(".next");
const prev = document.querySelector(".prev");

let index = 0;

function update(){
  track.style.transform = "translateX(-" + index * 100 + "%)";
}

next.onclick = () => {
  index = (index + 1) % slides.length;
  update();
};

prev.onclick = () => {
  index = (index - 1 + slides.length) % slides.length;
  update();
};
</script>

</body>
</html>
