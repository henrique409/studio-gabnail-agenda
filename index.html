<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Gabriela</title>

  <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>

<header class="topo">
  <div class="topo-container">

    <div class="logo">
      <img src="./img/logo.png">
      <span>Studio Gabriela</span>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-texto">

    <span class="tag">Curso Profissional de Unhas</span>

    <h1>
      Aprenda alongamento de unhas e 
      <span style="color:#ff2e93;">comece a faturar ainda esse mês</span>
    </h1>

    <p>Domine <strong>fibra de vidro</strong>, <strong>molde F1</strong>,
    <strong>esmaltação em gel</strong> e <strong>postiça realista</strong>.</p>

    <a href="#" class="botao-principal">
      QUERO APRENDER AGORA
    </a>

  </div>

  <div class="hero-imagem">
    <div class="carousel">

      <button class="nav prev">‹</button>

      <div class="viewport">
        <div class="track">
          <div class="slide"><img src="./img/gabriela-inicio-carreira.jpg"></div>
          <div class="slide"><img src="./img/professora2.jpg"></div>
          <div class="slide"><img src="./img/gabriela-atendendo-cliente.jpg"></div>
        </div>
      </div>

      <button class="nav next">›</button>

    </div>
  </div>
</section>

<!-- ⭐ AVALIAÇÕES -->
<section class="depoimentos">

  <h2>⭐ Avaliação das clientes</h2>

  <div id="media-nota">Média: 5.0 ⭐</div>

  <div class="dep-container" id="lista-depoimentos"></div>

  <div class="form-avaliacao">

    <input type="text" id="nome" placeholder="Seu nome">
    <textarea id="comentario" placeholder="Escreva seu comentário"></textarea>

    <div class="estrelas" id="estrelas">
      <span onclick="setNota(1)">★</span>
      <span onclick="setNota(2)">★</span>
      <span onclick="setNota(3)">★</span>
      <span onclick="setNota(4)">★</span>
      <span onclick="setNota(5)">★</span>
    </div>

    <button onclick="enviarAvaliacao()">Enviar avaliação</button>

  </div>

</section>

<script>

// CARROSSEL
document.querySelectorAll(".carousel").forEach(carousel => {
  const track = carousel.querySelector(".track");
  const slides = carousel.querySelectorAll(".slide");
  const next = carousel.querySelector(".next");
  const prev = carousel.querySelector(".prev");

  let index = 0;

  function update(){
    track.style.transform = "translateX(-" + index * 100 + "%)";
  }

  next.onclick = () => {
    index = (index + 1) % slides.length;
    update();
  };

  prev.onclick = () => {
    index = (index - 1 + slides.length) % slides.length;
    update();
  };
});

// ⭐ SISTEMA PRO
let nota = 5;

function setNota(n){
  nota = n;

  const estrelas = document.querySelectorAll("#estrelas span");
  estrelas.forEach((star, i) => {
    star.style.color = i < n ? "gold" : "#ccc";
  });
}

function salvarAvaliacoes(lista){
  localStorage.setItem("avaliacoes", JSON.stringify(lista));
}

function carregarAvaliacoes(){
  return JSON.parse(localStorage.getItem("avaliacoes")) || [];
}

function atualizarMedia(lista){
  if(lista.length === 0){
    document.getElementById("media-nota").innerText = "Sem avaliações";
    return;
  }

  const soma = lista.reduce((acc, item) => acc + item.nota, 0);
  const media = (soma / lista.length).toFixed(1);

  document.getElementById("media-nota").innerText =
    `Média: ${media} ⭐ (${lista.length} avaliações)`;
}

function renderizar(){
  const lista = carregarAvaliacoes();
  const container = document.getElementById("lista-depoimentos");

  container.innerHTML = "";

  lista.forEach(item => {
    const card = document.createElement("div");
    card.className = "dep-card";

    card.innerHTML = `
      <p>"${item.comentario}"</p>
      <span>— ${item.nome} | ${"⭐".repeat(item.nota)}</span>
    `;

    container.appendChild(card);
  });

  atualizarMedia(lista);
}

function enviarAvaliacao(){
  const nome = document.getElementById("nome").value;
  const comentario = document.getElementById("comentario").value;

  if(!nome || !comentario){
    alert("Preencha tudo!");
    return;
  }

  const lista = carregarAvaliacoes();

  lista.push({ nome, comentario, nota });

  salvarAvaliacoes(lista);
  renderizar();

  document.getElementById("nome").value = "";
  document.getElementById("comentario").value = "";

  setNota(5);
}

setNota(5);
renderizar();

</script>

</body>
</html>
